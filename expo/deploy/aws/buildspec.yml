version: 0.2

env:
  variables:
    AWS_REGION: us-east-1
    APP_NAME: ivx-holdings
    ECS_CLUSTER: ivx-holdings-cluster
    ECS_SERVICE: ivx-holdings-api-service
    CONTAINER_NAME: ivx-holdings-api
  parameter-store:
    ACCOUNT_ID: /ivx-holdings/account-id

phases:
  pre_build:
    commands:
      - echo "=== PRE BUILD ==="
      - echo "Logging in to Amazon ECR..."
      - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com
      - ECR_URI=$ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$APP_NAME-api
      - COMMIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
      - IMAGE_TAG=${COMMIT_HASH:-latest}
      - echo "Image tag -> $IMAGE_TAG"

  build:
    commands:
      - echo "=== BUILD ==="
      - echo "Building Docker image..."
      - docker build -t $ECR_URI:$IMAGE_TAG -t $ECR_URI:latest .
      - echo "Build completed"

  post_build:
    commands:
      - echo "=== POST BUILD ==="
      - echo "Pushing image to ECR..."
      - docker push $ECR_URI:$IMAGE_TAG
      - docker push $ECR_URI:latest
      - echo "Image pushed successfully"
      - echo "Updating ECS service..."
      - |
        TASK_DEF=$(aws ecs describe-task-definition \
          --task-definition $APP_NAME-api \
          --query 'taskDefinition' \
          --output json)
      - |
        NEW_TASK_DEF=$(echo $TASK_DEF | python3 -c "
        import sys, json
        td = json.load(sys.stdin)
        td['containerDefinitions'][0]['image'] = '$ECR_URI:$IMAGE_TAG'
        for key in ['taskDefinitionArn','revision','status','requiresAttributes','compatibilities','registeredAt','registeredBy']:
            td.pop(key, None)
        print(json.dumps(td))
        ")
      - |
        aws ecs register-task-definition \
          --cli-input-json "$NEW_TASK_DEF" \
          --query 'taskDefinition.taskDefinitionArn' \
          --output text
      - |
        aws ecs update-service \
          --cluster $ECS_CLUSTER \
          --service $ECS_SERVICE \
          --task-definition $APP_NAME-api \
          --force-new-deployment \
          --query 'service.serviceArn' \
          --output text
      - echo "Waiting for service to stabilize..."
      - |
        aws ecs wait services-stable \
          --cluster $ECS_CLUSTER \
          --services $ECS_SERVICE
      - echo "=== DEPLOYMENT COMPLETE ==="
      - printf '[{"name":"%s","imageUri":"%s"}]' $CONTAINER_NAME $ECR_URI:$IMAGE_TAG > imagedefinitions.json
      - cat imagedefinitions.json

artifacts:
  files:
    - imagedefinitions.json

cache:
  paths:
    - /root/.bun/install/cache/**/*
