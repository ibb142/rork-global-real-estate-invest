name: Deploy Landing Page to S3

on:
  push:
    branches: [main]
    paths:
      - 'ivxholding-landing/**'
      - 'deploy-landing.mjs'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Landing Page
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Inject env vars into HTML
        run: |
          sed -i "s|__IVX_SUPABASE_URL__|${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}|g" ivxholding-landing/index.html
          sed -i "s|__IVX_SUPABASE_ANON_KEY__|${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}|g" ivxholding-landing/index.html
          sed -i "s|__IVX_API_BASE_URL__|https://ivxholding.com|g" ivxholding-landing/index.html
          sed -i "s|__IVX_APP_URL__|${{ secrets.EXPO_PUBLIC_RORK_API_BASE_URL }}|g" ivxholding-landing/index.html

      - name: Upload to S3
        run: |
          aws s3 cp ivxholding-landing/index.html s3://ivxholding.com/index.html \
            --content-type "text/html; charset=utf-8" \
            --cache-control "no-cache, no-store, must-revalidate"
          
          if [ -f assets/images/ivx-logo.png ]; then
            aws s3 cp assets/images/ivx-logo.png s3://ivxholding.com/ivx-logo.png \
              --content-type "image/png" \
              --cache-control "public, max-age=31536000"
          fi
          
          echo "Deployment complete!"
          echo "Site: http://ivxholding.com.s3-website-us-east-1.amazonaws.com"
