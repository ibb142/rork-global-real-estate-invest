name: Scheduled Sync Verification

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      auto_fix:
        description: 'Auto-fix drift if detected'
        required: false
        default: false
        type: boolean

jobs:
  verify:
    name: Verify Sync Integrity
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check repo health
        run: |
          echo "### Sync Health Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          FILE_COUNT=$(find . -type f \
            -not -path './node_modules/*' \
            -not -path './.git/*' \
            -not -path './.expo/*' \
            -not -path './dist/*' \
            -not -name '*.lock' \
            -not -name '.DS_Store' | wc -l)
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| Tracked Files | $FILE_COUNT |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Last Commit | $(git log -1 --format='%h %s' 2>/dev/null) |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit Time | $(git log -1 --format='%ci' 2>/dev/null) |" >> $GITHUB_STEP_SUMMARY

      - name: Verify critical files
        run: |
          CRITICAL_FILES=(
            "app/_layout.tsx"
            "app/(tabs)/_layout.tsx"
            "app.json"
            "package.json"
            "tsconfig.json"
            "Dockerfile"
            ".github/workflows/master-pipeline.yml"
            ".github/workflows/ci.yml"
          )

          MISSING=0
          for f in "${CRITICAL_FILES[@]}"; do
            if [ ! -f "$f" ]; then
              echo "::error::Missing critical file: $f"
              MISSING=$((MISSING + 1))
            fi
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Critical Files" >> $GITHUB_STEP_SUMMARY
          if [ "$MISSING" -eq 0 ]; then
            echo "All ${#CRITICAL_FILES[@]} critical files present." >> $GITHUB_STEP_SUMMARY
          else
            echo "::error::$MISSING critical files missing"
            echo "$MISSING of ${#CRITICAL_FILES[@]} critical files MISSING" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Check last commit age
        run: |
          LAST_COMMIT_EPOCH=$(git log -1 --format='%ct' 2>/dev/null || echo 0)
          NOW_EPOCH=$(date +%s)
          AGE_HOURS=$(( (NOW_EPOCH - LAST_COMMIT_EPOCH) / 3600 ))

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Freshness" >> $GITHUB_STEP_SUMMARY
          echo "Last commit was $AGE_HOURS hours ago." >> $GITHUB_STEP_SUMMARY

          if [ "$AGE_HOURS" -gt 48 ]; then
            echo "::warning::Repository has not been updated in $AGE_HOURS hours — may need a sync"
          fi

      - name: Verify workflows are valid
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Workflows" >> $GITHUB_STEP_SUMMARY
          for wf in .github/workflows/*.yml; do
            NAME=$(basename "$wf")
            if python3 -c "import yaml; yaml.safe_load(open('$wf'))" 2>/dev/null; then
              echo "| $NAME | Valid |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| $NAME | INVALID |" >> $GITHUB_STEP_SUMMARY
              echo "::error::Invalid workflow: $NAME"
            fi
          done

      - name: Check AWS deployment status
        if: always()
        continue-on-error: true
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          if [ -z "$AWS_ACCESS_KEY_ID" ]; then
            echo "AWS credentials not configured — skipping"
            exit 0
          fi

          SERVICE_INFO=$(aws ecs describe-services \
            --cluster ivx-holdings-cluster \
            --services ivx-holdings-api-service \
            --query 'services[0].{Status:status,Running:runningCount,Desired:desiredCount}' \
            --output json 2>/dev/null || echo '{}')

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### AWS ECS Status" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`json" >> $GITHUB_STEP_SUMMARY
          echo "$SERVICE_INFO" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
