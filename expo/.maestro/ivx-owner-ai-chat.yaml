appId: app.rork.ivx
name: IVX Owner AI Chat Smoke
---
- launchApp
- tapOn:
    id: "home-owner-login-entry"
- inputText: ${OWNER_EMAIL}
- tapOn:
    id: "owner-login-password"
- inputText: ${OWNER_PASSWORD}
- tapOn:
    id: "owner-login-submit"
- assertVisible: "IVX"
- tapOn: "IVX Owner AI"
- inputText: "ping"
- tapOn:
    id: "ivx-owner-send-button"
- assertVisible:
    id: "ivx-owner-typing-indicator"
    timeout: 8000
- assertNotVisible:
    id: "ivx-owner-typing-indicator"
    timeout: 60000
