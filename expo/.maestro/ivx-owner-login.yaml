appId: app.rork.ivx
name: IVX Owner Login Flow
---
- launchApp:
    clearState: true
- assertVisible: "Welcome"
- tapOn: "Owner Login"
- assertVisible: "Owner Login"
- inputText: ${OWNER_EMAIL}
- tapOn:
    id: "owner-login-password"
- inputText: ${OWNER_PASSWORD}
- tapOn:
    id: "owner-login-submit"
- assertVisible: "IVX"
- assertVisible: "Owner"
