# Heap budgets are sized for the 8 GB build sandbox, where the Gradle JVM,
# the Kotlin compile daemon, and the agent process all share memory. Without
# an explicit kotlin.daemon.jvmargs the Kotlin daemon inherits the Gradle
# daemon's -Xmx, putting a second multi-GB JVM on the box.
org.gradle.jvmargs=-Xmx3g -Dfile.encoding=UTF-8 -XX:+UseParallelGC
kotlin.daemon.jvmargs=-Xmx2g
android.useAndroidX=true
kotlin.code.style=official
android.nonTransitiveRClass=true
android.enableJetifier=false
org.gradle.caching=true
org.gradle.configuration-cache=true
org.gradle.parallel=true
