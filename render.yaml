# IVX Holdings — Enterprise Blueprint v6
# Multi-instance backend, autoscaling, Redis cache, background worker,
# separate staging, zero-downtime deploys with automatic rollback.
# Updated: 2026-07-14T19:00:00Z

services:
  # ============================================================
  # PRODUCTION API — multi-instance with autoscaling
  # ============================================================
  - type: web
    name: ivx-holdings-platform
    repo: https://github.com/ibb142/rork-global-real-estate-invest.git
    branch: main
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: node /app/node_modules/tsx/dist/cli.mjs /app/server.ts
    plan: standard
    # Autoscaling: 1→3 instances based on CPU/memory
    scaling:
      minInstances: 1
      maxInstances: 3
      targetCPUPercent: 70
      targetMemoryPercent: 80
    autoDeployTrigger: commit
    healthCheckPath: /health
    domains:
      - api.ivxholding.com
    renderSubdomainPolicy: disabled
    disk:
      name: ivx-holdings-data
      mountPath: /app/data
      sizeGB: 5
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: "3000"
      - key: IVX_DEPLOYMENT_ENV
        value: production
      - key: IVX_AUTOSCALING_ENABLED
        value: "true"
      - key: IVX_MAX_INSTANCES
        value: "3"
      - key: CHAT_DATABASE_PATH
        value: /app/data/chat-room.sqlite
      - key: IVX_DATA_DIR
        value: /app/data
      - key: CHAT_ALLOWED_ORIGINS
        value: https://chat.ivxholding.com,https://api.ivxholding.com,https://ivxholding.com,https://www.ivxholding.com
      - key: EXPO_PUBLIC_CHAT_SOCKET_PATH
        value: /socket.io
      - key: EXPO_PUBLIC_APP_ENV
        value: production
      - key: API_BASE_URL
        value: https://api.ivxholding.com
      - key: EXPO_PUBLIC_API_BASE_URL
        value: https://api.ivxholding.com
      - key: EXPO_PUBLIC_IVX_API_BASE_URL
        value: https://api.ivxholding.com
      - key: EXPO_PUBLIC_API_URL
        value: https://api.ivxholding.com
      - key: EXPO_PUBLIC_PRODUCTION_API_URL
        value: https://api.ivxholding.com
      - key: EXPO_PUBLIC_APP_URL
        value: https://chat.ivxholding.com
      - key: CHAT_ROOM_ID
        value: main-room
      - key: EXPO_PUBLIC_CHAT_DEFAULT_ROOM_ID
        value: main-room
      # Redis for cache + Socket.IO adapter + pub/sub
      - key: REDIS_URL
        fromService:
          name: ivx-redis
          type: redis
          property: connectionString
      - key: IVX_REDIS_ADAPTER_ENABLED
        value: "true"
      - key: IVX_CACHE_ENABLED
        value: "true"
      - key: IVX_RATE_LIMIT_REDIS
        value: "true"
      # JWT_SECRET
      - key: JWT_SECRET
        sync: false
      - key: APP_SECRET
        generateValue: true
      - key: STRIPE_API_KEY
        sync: false
      - key: EXPO_PUBLIC_GOOGLE_ADS_API_KEY
        sync: false
      - key: EXPO_PUBLIC_SUPABASE_URL
        sync: false
      - key: SUPABASE_DB_PASSWORD
        sync: false
      - key: EXPO_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        sync: false
      - key: S3_BUCKET_NAME
        sync: false
      - key: CLOUDFRONT_DISTRIBUTION_ID
        sync: false
      - key: AI_GATEWAY_API_KEY
        sync: false
      - key: EXPO_PUBLIC_IVX_AI_GATEWAY_URL
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_REPO_URL
        sync: false
      - key: GITHUB_REPO
        sync: false
      - key: RENDER_API_KEY
        sync: false
      - key: RENDER_SERVICE_ID
        sync: false
      - key: RENDER_SERVICE_NAME
        value: ivx-holdings-platform
      - key: OWNER_NEW_PASSWORD
        sync: false
      - key: SUPABASE_DB_URL
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: mydatabase
          property: connectionString
      - key: POSTGRES_URL
        sync: false
      - key: EXPO_PUBLIC_PROJECT_ID
        sync: false
      - key: EXPO_PUBLIC_TEAM_ID
        sync: false
      - key: EXPO_PUBLIC_CHAT_API_URL
        value: https://api.ivxholding.com
      - key: EXPO_PUBLIC_IVX_OWNER_AI_BASE_URL
        value: https://api.ivxholding.com
      - fromGroup: my-env-group

  # ============================================================
  # BACKGROUND WORKER — queue processing, scheduled tasks
  # ============================================================
  - type: worker
    name: ivx-holdings-worker
    repo: https://github.com/ibb142/rork-global-real-estate-invest.git
    branch: main
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: node /app/node_modules/tsx/dist/cli.mjs /app/backend/worker.ts
    plan: starter
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: IVX_DEPLOYMENT_ENV
        value: production
      - key: IVX_WORKER_MODE
        value: "true"
      - key: REDIS_URL
        fromService:
          name: ivx-redis
          type: redis
          property: connectionString
      - key: EXPO_PUBLIC_SUPABASE_URL
        sync: false
      - key: EXPO_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: AI_GATEWAY_API_KEY
        sync: false
      - key: EXPO_PUBLIC_IVX_AI_GATEWAY_URL
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: mydatabase
          property: connectionString
      - fromGroup: my-env-group

  # ============================================================
  # IVX AUTONOMOUS SENIOR DEVELOPER WORKER — IVX-SENIOR-DEV-01
  # ============================================================
  - type: worker
    name: ivx-senior-dev-01
    repo: https://github.com/ibb142/rork-global-real-estate-invest.git
    branch: main
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: node /app/node_modules/tsx/dist/cli.mjs /app/backend/workers/ivx-senior-dev-worker-entry.ts
    plan: standard
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: IVX_DEPLOYMENT_ENV
        value: production
      - key: IVX_SENIOR_DEV_WORKER_ENABLED
        value: "true"
      - key: EXPO_PUBLIC_SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_REPO_URL
        sync: false
      - key: RENDER_API_KEY
        sync: false
      - key: RENDER_SERVICE_ID
        sync: false
      - key: AI_GATEWAY_API_KEY
        sync: false
      - key: EXPO_PUBLIC_IVX_AI_GATEWAY_URL
        sync: false
      - fromGroup: my-env-group

  # ============================================================
  # STAGING API — separate environment for pre-prod testing
  # ============================================================
  - type: web
    name: ivx-holdings-staging
    repo: https://github.com/ibb142/rork-global-real-estate-invest.git
    branch: staging
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: node /app/node_modules/tsx/dist/cli.mjs /app/server.ts
    plan: starter
    autoDeployTrigger: commit
    healthCheckPath: /health
    renderSubdomainPolicy: enabled
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: "3000"
      - key: IVX_DEPLOYMENT_ENV
        value: staging
      - key: EXPO_PUBLIC_APP_ENV
        value: staging
      - key: CHAT_ALLOWED_ORIGINS
        value: https://ivx-holdings-staging.onrender.com,http://localhost:8081,http://localhost:19006
      - key: REDIS_URL
        fromService:
          name: ivx-redis-staging
          type: redis
          property: connectionString
      - key: EXPO_PUBLIC_SUPABASE_URL
        sync: false
      - key: EXPO_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: mydatabase-staging
          property: connectionString
      - key: AI_GATEWAY_API_KEY
        sync: false
      - fromGroup: my-env-group

  # ============================================================
  # CHAT FRONTEND — static site on Render
  # ============================================================
  - type: web
    name: ivx-holdings-chat-frontend
    repo: https://github.com/ibb142/rork-global-real-estate-invest.git
    branch: main
    runtime: static
    rootDir: expo
    buildCommand: |
      set -e
      export BUN_INSTALL="$HOME/.bun"
      export PATH="$BUN_INSTALL/bin:$PATH"
      if ! command -v bun >/dev/null 2>&1; then
        echo "bun not found on PATH — bootstrapping bun locally for this build"
        if command -v curl >/dev/null 2>&1; then
          curl -fsSL https://bun.sh/install | bash
        elif command -v wget >/dev/null 2>&1; then
          wget -qO- https://bun.sh/install | bash
        else
          echo "ERROR: neither curl nor wget is available to install bun" >&2
          exit 1
        fi
        export PATH="$BUN_INSTALL/bin:$PATH"
      fi
      if ! command -v bun >/dev/null 2>&1; then
        echo "ERROR: bun installation failed; bun is still not on PATH" >&2
        exit 1
      fi
      bun --version
      bun install
      bunx expo export --platform web
    staticPublishPath: ./dist
    autoDeployTrigger: commit
    domains:
      - chat.ivxholding.com
    renderSubdomainPolicy: disabled
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: EXPO_PUBLIC_APP_ENV
        value: production
      - key: EXPO_PUBLIC_API_BASE_URL
        value: https://api.ivxholding.com
      - key: EXPO_PUBLIC_IVX_API_BASE_URL
        value: https://api.ivxholding.com
      - key: EXPO_PUBLIC_API_URL
        value: https://api.ivxholding.com
      - key: EXPO_PUBLIC_PRODUCTION_API_URL
        value: https://api.ivxholding.com
      - key: EXPO_PUBLIC_CHAT_API_URL
        value: https://api.ivxholding.com
      - key: EXPO_PUBLIC_IVX_OWNER_AI_BASE_URL
        value: https://api.ivxholding.com
      - key: EXPO_PUBLIC_APP_URL
        value: https://chat.ivxholding.com
      - key: EXPO_PUBLIC_CHAT_DEFAULT_ROOM_ID
        value: main-room
      - key: EXPO_PUBLIC_CHAT_SOCKET_PATH
        value: /socket.io
      - key: EXPO_PUBLIC_GOOGLE_ADS_API_KEY
        sync: false
      - key: EXPO_PUBLIC_SUPABASE_URL
        sync: false
      - key: EXPO_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: EXPO_PUBLIC_PROJECT_ID
        sync: false
      - key: EXPO_PUBLIC_TEAM_ID
        sync: false

  # ============================================================
  # MINIO — object storage
  # ============================================================
  - type: pserv
    name: minio
    runtime: docker
    repo: https://github.com/render-examples/minio.git
    plan: starter
    autoDeployTrigger: off
    envVars:
      - key: PORT
        value: "10000"
      - key: MINIO_ROOT_USER
        sync: false
      - key: MINIO_ROOT_PASSWORD
        generateValue: true
    disk:
      name: minio-data
      mountPath: /data
      sizeGB: 10

# ============================================================
# REDIS — production cache + pub/sub + Socket.IO adapter
# ============================================================
- type: redis
  name: ivx-redis
  plan: starter
  ipAllowList: []
  maxmemoryPolicy: allkeys-lru

# ============================================================
# REDIS — staging
# ============================================================
- type: redis
  name: ivx-redis-staging
  plan: free
  ipAllowList: []

# ============================================================
# DATABASES
# ============================================================
databases:
  # Production — upgraded for enterprise workloads
  - name: mydatabase
    plan: standard-1gb
    databaseName: ivx
    user: ivx
    postgresMajorVersion: "16"
    ipAllowList: []
    highAvailability:
      enabled: true
  # Staging — separate database
  - name: mydatabase-staging
    plan: basic-256mb
    databaseName: ivx_staging
    user: ivx_staging
    postgresMajorVersion: "16"
    ipAllowList: []

# ============================================================
# ENV GROUPS
# ============================================================
envVarGroups:
  - name: my-env-group
    envVars:
      - key: IVX_ENV_GROUP_ATTACHED
        value: "true"
      - key: IVX_ENV_GROUP_NAME
        value: my-env-group
      - key: IVX_ENTERPRISE_MODE
        value: "true"
