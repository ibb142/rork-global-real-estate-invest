name: AWS Infrastructure Setup

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options:
          - validate
          - deploy-stack
          - setup-dns
          - status
          - destroy
      environment:
        description: 'Target environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
      certificate_arn:
        description: 'ACM Certificate ARN (required for deploy-stack)'
        required: false
        type: string

env:
  AWS_REGION: us-east-1
  APP_NAME: ivx-holdings
  DOMAIN_NAME: api.ivxholding.com

permissions:
  id-token: write
  contents: read

jobs:
  infrastructure:
    name: ${{ github.event.inputs.action }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS authentication
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "AWS Account: $ACCOUNT_ID"
          echo "ACCOUNT_ID=$ACCOUNT_ID" >> $GITHUB_ENV

      - name: Validate infrastructure
        if: github.event.inputs.action == 'validate'
        run: |
          echo "### Infrastructure Validation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "Validating CloudFormation template..."
          aws cloudformation validate-template \
            --template-body file://deploy/aws/cloudformation.yml \
            --region ${{ env.AWS_REGION }} > /dev/null
          echo "| CloudFormation Template | Valid |" >> $GITHUB_STEP_SUMMARY

          STACK_STATUS=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.APP_NAME }}-stack \
            --region ${{ env.AWS_REGION }} \
            --query 'Stacks[0].StackStatus' \
            --output text 2>/dev/null || echo "NOT_FOUND")
          echo "| Stack Status | $STACK_STATUS |" >> $GITHUB_STEP_SUMMARY

          ECR_EXISTS=$(aws ecr describe-repositories \
            --repository-names ${{ env.APP_NAME }}-api \
            --region ${{ env.AWS_REGION }} \
            --query 'repositories[0].repositoryUri' \
            --output text 2>/dev/null || echo "NOT_FOUND")
          echo "| ECR Repository | $ECR_EXISTS |" >> $GITHUB_STEP_SUMMARY

          CERT_ARN=$(aws acm list-certificates \
            --region us-east-1 \
            --certificate-statuses ISSUED PENDING_VALIDATION \
            --query "CertificateSummaryList[?contains(DomainName,'ivxholding.com')].{ARN:CertificateArn,Status:Status}" \
            --output json 2>/dev/null || echo "[]")
          echo "| ACM Certificates | $(echo $CERT_ARN | python3 -c 'import sys,json; certs=json.load(sys.stdin); print(f"{len(certs)} found" if certs else "None")') |" >> $GITHUB_STEP_SUMMARY

          SECRETS=$(aws secretsmanager list-secrets \
            --filter "Key=name,Values=${{ env.APP_NAME }}/" \
            --region ${{ env.AWS_REGION }} \
            --query 'SecretList[].Name' \
            --output json 2>/dev/null || echo "[]")
          SECRET_COUNT=$(echo $SECRETS | python3 -c "import sys,json; print(len(json.load(sys.stdin)))")
          echo "| Secrets Manager | $SECRET_COUNT secrets |" >> $GITHUB_STEP_SUMMARY

          echo ""
          echo "Validation complete"

      - name: Deploy CloudFormation stack
        if: github.event.inputs.action == 'deploy-stack'
        run: |
          ENVIRONMENT="${{ github.event.inputs.environment }}"
          STACK_NAME="${{ env.APP_NAME }}-stack"

          CERT_ARN="${{ github.event.inputs.certificate_arn }}"
          if [ -z "$CERT_ARN" ]; then
            CERT_ARN=$(aws acm list-certificates \
              --region us-east-1 \
              --certificate-statuses ISSUED \
              --query "CertificateSummaryList[?contains(DomainName,'ivxholding.com')].CertificateArn" \
              --output text 2>/dev/null | head -1)
          fi

          if [ -z "$CERT_ARN" ] || [ "$CERT_ARN" = "None" ]; then
            echo "::error::No ACM certificate found. Request one first or provide certificate_arn input."
            exit 1
          fi
          echo "Using certificate: $CERT_ARN"

          ECR_URI="${ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.APP_NAME }}-api"

          aws ecr describe-repositories \
            --repository-names ${{ env.APP_NAME }}-api \
            --region ${{ env.AWS_REGION }} >/dev/null 2>&1 || \
            aws ecr create-repository \
              --repository-name ${{ env.APP_NAME }}-api \
              --region ${{ env.AWS_REGION }} >/dev/null

          DESIRED_COUNT=2
          if [ "$ENVIRONMENT" = "staging" ]; then
            DESIRED_COUNT=1
          fi

          echo "Deploying CloudFormation stack: $STACK_NAME"
          aws cloudformation deploy \
            --template-file deploy/aws/cloudformation.yml \
            --stack-name "$STACK_NAME" \
            --parameter-overrides \
              "Environment=$ENVIRONMENT" \
              "AppName=${{ env.APP_NAME }}" \
              "DomainName=${{ env.DOMAIN_NAME }}" \
              "CertificateArn=$CERT_ARN" \
              "ContainerImage=$ECR_URI:latest" \
              "DesiredCount=$DESIRED_COUNT" \
            --capabilities CAPABILITY_NAMED_IAM \
            --region ${{ env.AWS_REGION }} \
            --no-fail-on-empty-changeset

          echo "Stack deployed successfully"

          ALB_DNS=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='ALBDNS'].OutputValue" \
            --output text \
            --region ${{ env.AWS_REGION }})

          echo "### Stack Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| Stack | $STACK_NAME |" >> $GITHUB_STEP_SUMMARY
          echo "| ALB DNS | $ALB_DNS |" >> $GITHUB_STEP_SUMMARY
          echo "| Certificate | $CERT_ARN |" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | $ENVIRONMENT |" >> $GITHUB_STEP_SUMMARY

      - name: Setup DNS + SSL
        if: github.event.inputs.action == 'setup-dns'
        run: |
          echo "Setting up Route53 + ACM for ivxholding.com..."

          ZONE_ID=$(aws route53 list-hosted-zones-by-name \
            --dns-name ivxholding.com \
            --query "HostedZones[?Name=='ivxholding.com.'].Id" \
            --output text 2>/dev/null | sed 's|/hostedzone/||')

          if [ -z "$ZONE_ID" ] || [ "$ZONE_ID" = "None" ]; then
            echo "Creating hosted zone for ivxholding.com..."
            ZONE_RESULT=$(aws route53 create-hosted-zone \
              --name ivxholding.com \
              --caller-reference "ivx-holdings-$(date +%s)" \
              --output json)
            ZONE_ID=$(echo $ZONE_RESULT | python3 -c "import sys,json; print(json.load(sys.stdin)['HostedZone']['Id'].replace('/hostedzone/',''))")
            NS=$(echo $ZONE_RESULT | python3 -c "import sys,json; ns=json.load(sys.stdin)['DelegationSet']['NameServers']; print('\n'.join(ns))")
            echo "::warning::Created hosted zone: $ZONE_ID"
            echo "::warning::Update your domain registrar with these NS records:"
            echo "$NS"
          else
            echo "Hosted zone exists: $ZONE_ID"
          fi

          CERT_ARN=$(aws acm list-certificates \
            --region us-east-1 \
            --certificate-statuses ISSUED PENDING_VALIDATION \
            --query "CertificateSummaryList[?DomainName=='*.ivxholding.com' || DomainName=='ivxholding.com'].CertificateArn" \
            --output text 2>/dev/null | head -1)

          if [ -z "$CERT_ARN" ] || [ "$CERT_ARN" = "None" ]; then
            echo "Requesting ACM certificate for *.ivxholding.com..."
            CERT_ARN=$(aws acm request-certificate \
              --domain-name "*.ivxholding.com" \
              --subject-alternative-names "ivxholding.com" "*.ivxholding.com" \
              --validation-method DNS \
              --region us-east-1 \
              --query 'CertificateArn' \
              --output text)
            echo "Certificate requested: $CERT_ARN"
            echo "Waiting 15s for validation records..."
            sleep 15

            VALIDATION=$(aws acm describe-certificate \
              --certificate-arn "$CERT_ARN" \
              --region us-east-1 \
              --query 'Certificate.DomainValidationOptions[].ResourceRecord' \
              --output json 2>/dev/null || echo "[]")

            echo $VALIDATION | python3 -c "
          import sys, json
          records = json.load(sys.stdin)
          seen = set()
          changes = []
          for r in records:
              if r and r.get('Name') and r['Name'] not in seen:
                  seen.add(r['Name'])
                  changes.append({
                      'Action': 'UPSERT',
                      'ResourceRecordSet': {
                          'Name': r['Name'],
                          'Type': r['Type'],
                          'TTL': 300,
                          'ResourceRecords': [{'Value': r['Value']}]
                      }
                  })
          if changes:
              print(json.dumps({'Changes': changes, 'Comment': 'ACM DNS validation'}))
          else:
              print('{}')
          " > /tmp/validation-changes.json

            CHANGES=$(cat /tmp/validation-changes.json)
            if [ "$CHANGES" != "{}" ]; then
              aws route53 change-resource-record-sets \
                --hosted-zone-id "$ZONE_ID" \
                --change-batch "$CHANGES" >/dev/null
              echo "DNS validation records created"
            else
              echo "::warning::No validation records available yet — check ACM console"
            fi
          else
            echo "Certificate exists: $CERT_ARN"
          fi

          STACK_NAME="${{ env.APP_NAME }}-stack"
          ALB_DNS=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='ALBDNS'].OutputValue" \
            --output text \
            --region ${{ env.AWS_REGION }} 2>/dev/null || echo "")

          if [ -n "$ALB_DNS" ] && [ "$ALB_DNS" != "None" ]; then
            echo "Pointing DNS records to ALB: $ALB_DNS"
            cat > /tmp/dns-changes.json << EOF
          {
            "Changes": [
              {
                "Action": "UPSERT",
                "ResourceRecordSet": {
                  "Name": "api.ivxholding.com.",
                  "Type": "CNAME",
                  "TTL": 300,
                  "ResourceRecords": [{"Value": "$ALB_DNS"}]
                }
              },
              {
                "Action": "UPSERT",
                "ResourceRecordSet": {
                  "Name": "app.ivxholding.com.",
                  "Type": "CNAME",
                  "TTL": 300,
                  "ResourceRecords": [{"Value": "$ALB_DNS"}]
                }
              },
              {
                "Action": "UPSERT",
                "ResourceRecordSet": {
                  "Name": "www.ivxholding.com.",
                  "Type": "CNAME",
                  "TTL": 300,
                  "ResourceRecords": [{"Value": "$ALB_DNS"}]
                }
              }
            ],
            "Comment": "IVX Holdings DNS records - API + app + www -> ALB"
          }
          EOF
            aws route53 change-resource-record-sets \
              --hosted-zone-id "$ZONE_ID" \
              --change-batch file:///tmp/dns-changes.json >/dev/null
            echo "DNS records updated"
          else
            echo "::warning::ALB not deployed yet — deploy the stack first, then re-run DNS setup"
          fi

          echo "### DNS + SSL Setup" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| Hosted Zone | $ZONE_ID |" >> $GITHUB_STEP_SUMMARY
          echo "| Certificate | $CERT_ARN |" >> $GITHUB_STEP_SUMMARY
          echo "| ALB DNS | ${ALB_DNS:-Not deployed} |" >> $GITHUB_STEP_SUMMARY

      - name: Check status
        if: github.event.inputs.action == 'status'
        run: |
          STACK_NAME="${{ env.APP_NAME }}-stack"

          echo "### Infrastructure Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Resource | Status |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY

          STACK_STATUS=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --region ${{ env.AWS_REGION }} \
            --query 'Stacks[0].StackStatus' \
            --output text 2>/dev/null || echo "NOT_FOUND")
          echo "| CloudFormation Stack | $STACK_STATUS |" >> $GITHUB_STEP_SUMMARY

          SERVICE_STATUS=$(aws ecs describe-services \
            --cluster ${{ env.APP_NAME }}-cluster \
            --services ${{ env.APP_NAME }}-api-service \
            --region ${{ env.AWS_REGION }} \
            --query 'services[0].{Status:status,Running:runningCount,Desired:desiredCount}' \
            --output json 2>/dev/null || echo "{}")
          echo "| ECS Service | $(echo $SERVICE_STATUS | python3 -c "import sys,json; d=json.load(sys.stdin); print(f\"{d.get('Status','N/A')} ({d.get('Running','?')}/{d.get('Desired','?')} tasks)\")" 2>/dev/null || echo "N/A") |" >> $GITHUB_STEP_SUMMARY

          ECR_URI=$(aws ecr describe-repositories \
            --repository-names ${{ env.APP_NAME }}-api \
            --region ${{ env.AWS_REGION }} \
            --query 'repositories[0].repositoryUri' \
            --output text 2>/dev/null || echo "NOT_FOUND")
          echo "| ECR Repository | $ECR_URI |" >> $GITHUB_STEP_SUMMARY

          TABLE_STATUS=$(aws dynamodb describe-table \
            --table-name "${{ env.APP_NAME }}-${{ github.event.inputs.environment }}" \
            --region ${{ env.AWS_REGION }} \
            --query 'Table.TableStatus' \
            --output text 2>/dev/null || echo "NOT_FOUND")
          echo "| DynamoDB | $TABLE_STATUS |" >> $GITHUB_STEP_SUMMARY

          BUCKET_STATUS=$(aws s3api head-bucket --bucket "${{ env.APP_NAME }}-prod" --region ${{ env.AWS_REGION }} 2>&1 && echo "EXISTS" || echo "NOT_FOUND")
          echo "| S3 Bucket | $BUCKET_STATUS |" >> $GITHUB_STEP_SUMMARY

          ALB_DNS=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='ALBDNS'].OutputValue" \
            --output text \
            --region ${{ env.AWS_REGION }} 2>/dev/null || echo "N/A")
          echo "| ALB DNS | $ALB_DNS |" >> $GITHUB_STEP_SUMMARY

          SECRETS=$(aws secretsmanager list-secrets \
            --filter "Key=name,Values=${{ env.APP_NAME }}/" \
            --region ${{ env.AWS_REGION }} \
            --query 'SecretList[].Name' \
            --output json 2>/dev/null || echo "[]")
          SECRET_COUNT=$(echo $SECRETS | python3 -c "import sys,json; print(len(json.load(sys.stdin)))")
          echo "| Secrets | $SECRET_COUNT configured |" >> $GITHUB_STEP_SUMMARY

      - name: Destroy stack
        if: github.event.inputs.action == 'destroy'
        run: |
          echo "::warning::Destroying CloudFormation stack: ${{ env.APP_NAME }}-stack"
          echo "This will delete ALL resources including ECS, ALB, DynamoDB, etc."
          echo "S3 bucket has DeletionPolicy: Retain and will NOT be deleted."

          aws cloudformation delete-stack \
            --stack-name ${{ env.APP_NAME }}-stack \
            --region ${{ env.AWS_REGION }}

          echo "Waiting for stack deletion..."
          aws cloudformation wait stack-delete-complete \
            --stack-name ${{ env.APP_NAME }}-stack \
            --region ${{ env.AWS_REGION }} || true

          echo "Stack deletion complete"
          echo "### Stack Destroyed" >> $GITHUB_STEP_SUMMARY
