name: IVX CI

on:
  workflow_dispatch:
    inputs:
      testTarget:
        description: Backend test files or directories to run
        required: false
        default: backend/ivx-registration-orchestrator.test.ts backend/ivx-timezone.test.ts
      buildApk:
        description: Also build the Android release APK (set to "true")
        required: false
        default: "false"
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/ivx-ci.yml"

jobs:
  backend-tests:
    name: Backend tests (bun)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install
      - name: Run env-independent backend tests
        run: |
          TARGET="${{ github.event.inputs.testTarget || 'backend/ivx-registration-orchestrator.test.ts backend/ivx-timezone.test.ts' }}"
          if [ "$TARGET" = "default" ] || [ "$TARGET" = "all" ]; then
            echo "Running full backend test suite (env-independent files)..."
            bun test backend/ivx-registration-orchestrator.test.ts backend/ivx-timezone.test.ts backend/ivx-senior-developer-capabilities.test.ts backend/ivx-ci-build-runner.test.ts backend/ivx-growth-autonomous-ops.test.ts
          else
            echo "Running targeted tests: $TARGET"
            bun test $TARGET
          fi

  android-apk:
    name: Android release APK
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.buildApk == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-35 build-tools;35.0.0'
      - name: Install root dependencies
        run: bun install
      - name: Install expo dependencies
        run: cd expo && bun install
      - name: Build release APK
        run: cd expo/android && ./gradlew assembleRelease --no-daemon -x lint
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
      - name: Record APK SHA-256
        run: sha256sum expo/android/app/build/outputs/apk/release/*.apk
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ivx-holdings-apk
          path: expo/android/app/build/outputs/apk/release/*.apk
